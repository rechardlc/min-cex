services:
  postgres:
    image: postgres:13
    pull_policy: never
    container_name: cex_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cex
      POSTGRES_PASSWORD: cex_secret
      POSTGRES_DB: cex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cex -d cex_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
